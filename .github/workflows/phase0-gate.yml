name: Phase 0 Gate — Entity Graph Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  entity-graph-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Entity Graph tests (Phase 0 gate)
        run: npx jest src/__tests__/entityGraph.test.js --verbose

      - name: Run all unit tests
        run: npm test -- --passWithNoTests
