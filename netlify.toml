[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Route /api/* to the correct Netlify function
[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/projects/*"
  to = "/.netlify/functions/projects"
  status = 200

[[redirects]]
  from = "/api/projects"
  to = "/.netlify/functions/projects"
  status = 200

[[redirects]]
  from = "/api/staging/*"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/staging"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/ideas/*"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/ideas"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/sessions/*"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/sessions"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/comments/*"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/comments"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/data"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  included_files = []

# Environment variables — set these in Netlify dashboard
# DO NOT commit real values here
[context.production.environment]
  NODE_ENV = "production"
